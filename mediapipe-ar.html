<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>PersonaShield Privacy Avatar Demo</title>
    <link rel="stylesheet" href="./src/styles.css">
    <script src="./vendor/jeeliz/libs/three/v112/three.min.js"></script>
    <script src="./vendor/three/examples/js/loaders/GLTFLoader.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="PersonaShield privacy-protected preview">
        <video id="inputVideo" class="verify-video" muted playsinline loop preload="auto"></video>
        <canvas id="arCanvas" width="960" height="720"></canvas>
        <canvas id="beautyCanvas" width="960" height="720"></canvas>
        <div id="facePickerOverlay" class="face-picker-overlay" aria-label="Clickable face selector"></div>
        <div class="status-bar" id="statusBar">Initializing PersonaShield...</div>
      </section>

      <aside class="control-panel">
        <header>
          <p class="eyebrow">AI glasses privacy prototype</p>
          <h1>PersonaShield</h1>
          <p class="subtitle">Identity-aware digital substitutes for privacy-preserving first-person capture.</p>
        </header>

        <div class="control-group">
          <label for="inputMode">Input</label>
          <div class="segmented" id="inputMode">
            <button type="button" data-input-mode="camera">Camera</button>
            <button type="button" class="is-active" data-input-mode="video">Video</button>
          </div>
          <input id="videoFileInput" class="file-input" type="file" accept="video/*">
        </div>

        <div class="control-group">
          <label for="assignmentMode">Privacy action assignment</label>
          <div class="segmented" id="assignmentMode">
            <button type="button" class="is-active" data-assignment-mode="auto">Auto</button>
            <button type="button" data-assignment-mode="manual">Manual</button>
          </div>
        </div>

        <div class="control-group">
          <label for="manualSlot">Manual privacy preview</label>
          <div class="selected-face-summary" id="selectedFaceLabel">Selected face: none</div>
          <div class="manual-grid">
            <select id="manualSlot" aria-label="Face slot"></select>
            <select id="manualEffect" aria-label="Privacy action"></select>
          </div>
        </div>

        <div class="control-group identity-panel">
          <label for="referenceFaceInput">Protected identity registration</label>
          <div class="identity-grid">
            <input id="referenceNameInput" class="text-input" type="text" value="Person A" aria-label="Reference person name">
            <select id="referenceEffect" aria-label="Reference privacy action"></select>
          </div>
          <input id="referenceFaceInput" class="file-input" type="file" accept="image/*">
          <button type="button" id="registerReferenceButton" class="wide-button">Register protected identity</button>
          <div id="referencePeopleList" class="reference-list" aria-label="Registered reference people"></div>
        </div>

        <div class="button-row">
          <button type="button" id="toggleEffectsButton">Hide protection</button>
          <button type="button" id="resetBindingsButton">Reset bindings</button>
        </div>
        <div class="control-group">
          <button type="button" id="captureFrameButton" class="wide-button">Capture protected frame</button>
          <a id="downloadFrameLink" class="download-link" hidden download="personashield-protected-frame.png">Download protected frame</a>
        </div>

        <section class="debug-panel" aria-label="Tracking debug panel">
          <div class="debug-kpis">
            <div><span id="faceCount">0</span><small>faces</small></div>
            <div><span id="fpsValue">0</span><small>fps</small></div>
            <div><span id="modeValue">auto</span><small>mode</small></div>
          </div>
          <div class="slot-meter" id="slotMeter" aria-label="MediaPipe face slots"></div>
          <div id="trackList" class="track-list"></div>
        </section>
      </aside>
    </main>

    <script type="module" src="./src/mediapipeApp.js"></script>
  </body>
</html>
